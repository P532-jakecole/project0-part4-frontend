<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration</title>
    <style>
        body {font-family: Arial, Helvetica, sans-serif;}
        * {box-sizing: border-box}

        input[type=text], input[type=password] {
            width: 100%;
            padding: 15px;
            margin: 5px 0 22px 0;
            display: inline-block;
            border: none;
            background: #f1f1f1;
        }

        input[type=text]:focus, input[type=password]:focus {
            background-color: #ddd;
            outline: none;
        }

        hr {
            border: 1px solid #f1f1f1;
            margin-bottom: 25px;
        }

        button {
            background-color: #04AA6D;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 100%;
            opacity: 0.9;
        }

        button:hover {
            opacity:1;
        }

        .cancelbtn {
            padding: 14px 20px;
            background-color: #f44336;
        }

        .cancelbtn, .signupbtn {
            float: left;
            width: 50%;
        }

        .container {
            padding: 16px;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

    </style>
</head>
<body>
<form  style="border:1px solid #ccc">
    <div class="container">
        <h1>Sign Up</h1>
        <hr>

        <label for="email"><b>Email</b></label>
        <input type="text" placeholder="Enter Email" id="email" required>

        <label for="username"><b>Username</b></label>
        <input type="text"  placeholder="Enter Username" id="username" required>

        <label for="password"><b>Password</b></label>
        <input type="password" placeholder="Enter Password" id="password" required>

        <div class="clearfix">
            <button type="button" class="cancelbtn">Cancel</button>
            <button type="button" onclick="signup()" class="signupbtn">Sign Up</button>
        </div>
    </div>
</form>

<script>
    async function signup() {
        let host = "https://duck-service-jakecole.onrender.com";
        let email = document.getElementById("email").value;
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        let customer = {email:email, username: username, password: password}
        let request = {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(customer)
        };
        try {
            let response = await fetch(host + "/signup", request);
            if(response.status == 200) {
                alert("The registration was successful!")
                location.href = "login.html";

            } else {
                console.log(`response status:${response.status}`);
                alert("Something went wrong!");
            }
        }
        catch(error) {
            console.log(error);
            alert("Something went wrong!");
        }
    }
</script>
</body>
</html>
