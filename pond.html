<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
            width: 20%;
            border-radius: 5px;
        }

        .card:hover {
            box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
        }

        img {
            border-radius: 5px 5px 0 0;
        }

        .container {
            padding: 2px 16px;
        }
    </style>
</head>
<body>
<script>
    async function getAll(){
        let host = "https://duck-service-jakecole.onrender.com";
        let token = localStorage.getItem("token");
        let response = await fetch(host + "/ducks",
            {headers: {"Authorization": `Bearer ${token}`}});
        return await response.json();
    }

    function createCard(id, type){
        const card = document.createElement("div");
        card.className = "card";
        const img = document.createElement("img");
        img.src = `https://ducksservice-jakecole.onrender.com/ducks/${id}/image`;
        img.alt = "Avatar";
        img.style.width = "100%";
        card.appendChild(img);

        const container = document.createElement("div");
        container.className = "container";

        const header = document.createElement("h4");
        const b = document.createElement("b");
        b.textContent = id;
        header.appendChild(b);
        container.appendChild(header);

        const p = document.createElement("p");
        p.textContent = type;
        container.appendChild(p);

        card.appendChild(container);

        document.getElementById("DuckHolder").appendChild(card);
        console.log("Added Card")
    }

    async function create(){
        let ducks = [];

        ducks = await getAll();

        for(let duck of ducks){
            let id = duck.id;
            let type = duck.type;
            createCard(id, type);
        }
    }

    create();

</script>
    <div id="DuckHolder"></div>
</body>
</html>
